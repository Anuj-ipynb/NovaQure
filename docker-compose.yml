services:

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile

    container_name: novaqure-backend

    ports:
      - "8000:8000"

    volumes:
      - ./novaqure.db:/app/novaqure.db

    restart: unless-stopped


  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile

    container_name: novaqure-frontend

    ports:
      - "5173:5173"

    depends_on:
      - backend

    restart: unless-stopped
